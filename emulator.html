      <!-- MAIN EMULATOR PAGE -->
      <div class="container">
         <h1>Website Emulator</h1>
         <input id="urlInput" type="text" placeholder="Enter URL (example: https://example.com)">
         <button id="loadBtn">Load</button>
         <button id="fullscreenBtn">Fullscreen</button>
         <br>
         <iframe id="previewFrame"></iframe>
         <p id="note">Cannot Emulate all Websites like YouTube.</p>
      </div>
      <script>
         const frame = document.getElementById("previewFrame");
         const loadBtn = document.getElementById("loadBtn");
         const fullscreenBtn = document.getElementById("fullscreenBtn");
         
         loadBtn.onclick = () => {
             let url = document.getElementById("urlInput").value;
             if (!url.startsWith("http://") && !url.startsWith("https://")) {
                 url = "https://" + url;
             }
             frame.src = url;
         };
         
         fullscreenBtn.onclick = () => {
             if (frame.requestFullscreen) frame.requestFullscreen();
         };
         
         /* AUTO-FILL + AUTO-LOAD QUICK LINKS */
         function openQuickLink(url) {
             document.getElementById("urlInput").value = url;
             frame.src = url;
         }
      </script>
