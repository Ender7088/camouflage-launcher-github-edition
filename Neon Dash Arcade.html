<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash: Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            pointer-events: none;
            text-shadow: 0 0 10px #0ff;
        }
        #menu, #gameOver, #storyBrief {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 2.5rem;
            border: 3px solid #0ff;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            color: white;
            min-width: 340px;
            backdrop-filter: blur(8px);
            z-index: 10;
        }
        .btn {
            margin: 0.5rem;
            padding: 12px 24px;
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
            pointer-events: auto;
        }
        .btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff;
            transform: scale(1.05);
        }
        .btn-story { border-color: #f0f; color: #f0f; }
        .btn-story:hover { background: #f0f; color: #000; box-shadow: 0 0 20px #f0f; }
        
        .hidden { display: none; }
        #shieldIndicator {
            color: #0f0;
            font-weight: bold;
            display: block;
            margin-top: 5px;
            text-shadow: 0 0 8px #0f0;
        }
        .progress-container {
            width: 200px;
            height: 10px;
            background: #222;
            border: 1px solid #0ff;
            margin-top: 10px;
            border-radius: 5px;
            overflow: hidden;
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background: #0ff;
            box-shadow: 0 0 10px #0ff;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div class="text-3xl font-black"><span id="modeLabel">SCORE</span>: <span id="scoreVal">0</span></div>
        <div id="levelDisplay" class="text-sm opacity-70">LEVEL: <span id="levelVal">1</span></div>
        
        <!-- Story Progress -->
        <div id="storyUI" class="hidden">
            <div class="text-xs mt-2 uppercase tracking-widest">Sector Sync</div>
            <div class="progress-container">
                <div id="progressBar"></div>
            </div>
        </div>

        <div id="shieldIndicator" class="hidden">SHIELD ACTIVE</div>
        <div class="text-xs mt-2 opacity-50">HIGH SCORE: <span id="highScoreVal">0</span></div>
    </div>

    <!-- Main Menu -->
    <div id="menu">
        <h1 class="text-5xl font-black mb-2 text-cyan-400 tracking-tighter italic">NEON DASH</h1>
        <p class="text-xs text-cyan-700 font-bold mb-6 tracking-[0.3em]">CORE OS v2.0</p>
        
        <div class="flex flex-col space-y-2">
            <button class="btn" onclick="startEndless()">Endless Mode</button>
            <button class="btn btn-story" onclick="showStoryBrief()">Story Mode</button>
        </div>
        
        <div class="mt-6 grid grid-cols-2 gap-2 text-[10px] opacity-60 text-left border-t border-cyan-900 pt-4">
            <div>🔴 Hazards</div>
            <div>⚡ Zappers</div>
            <div>💎 Data Bits</div>
            <div>🛡️ Shield Up</div>
        </div>
    </div>

    <!-- Story Briefing -->
    <div id="storyBrief" class="hidden">
        <h2 id="sectorTitle" class="text-2xl font-bold text-fuchsia-500 mb-2">SECTOR 01: THE FRINGE</h2>
        <p id="sectorDesc" class="text-sm opacity-90 mb-6 leading-relaxed">
            The firewall is closing in. Collect 500 units of data to bypass the first security gate. Watch out for debris.
        </p>
        <button class="btn btn-story" onclick="startStory()">Commence Uplink</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOver" class="hidden">
        <h2 id="deathTitle" class="text-4xl font-bold text-red-500 mb-2">CRITICAL FAILURE</h2>
        <p class="text-xl mb-4">Results: <span id="finalScore" class="text-cyan-400 font-bold">0</span></p>
        <button class="btn" onclick="location.reload()">Main Menu</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const levelEl = document.getElementById('levelVal');
        const shieldEl = document.getElementById('shieldIndicator');
        const highScoreEl = document.getElementById('highScoreVal');
        const finalScoreEl = document.getElementById('finalScore');
        const modeLabel = document.getElementById('modeLabel');
        const storyUI = document.getElementById('storyUI');
        const progressBar = document.getElementById('progressBar');
        
        const menu = document.getElementById('menu');
        const storyBrief = document.getElementById('storyBrief');
        const gameOverScreen = document.getElementById('gameOver');

        // Game State
        let gameActive = false;
        let gameMode = 'endless'; // 'endless' or 'story'
        let score = 0;
        let level = 1;
        let storySector = 1;
        let sectorGoal = 500;
        let highScore = localStorage.getItem('neonDashHighScore') || 0;
        highScoreEl.innerText = highScore;

        const sectors = [
            { title: "SECTOR 01: THE FRINGE", goal: 500, desc: "The firewall is closing in. Collect 500 units of data to bypass the first security gate. Watch out for debris.", speed: 1.0, spawn: 0.02 },
            { title: "SECTOR 02: GRID RUNNER", goal: 1200, desc: "Gate 1 cleared. Security is tightening. Blue Zappers detected in this corridor. Collect 1200 units.", speed: 1.3, spawn: 0.035 },
            { title: "SECTOR 03: THE CORE", goal: 2500, desc: "This is the mainframe. Everything is faster here. 2500 units required for total system override.", speed: 1.7, spawn: 0.05 }
        ];

        let player = {
            x: 0,
            y: 0,
            size: 32,
            targetX: 0,
            color: '#0ff',
            hasShield: false,
            shake: 0
        };

        let obstacles = [];
        let particles = [];
        let collectibles = [];
        let speedMultiplier = 1;
        let spawnRate = 0.02;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.y = canvas.height - 120;
            if (!gameActive) player.x = canvas.width / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        // Input
        const updateInput = (e) => {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            player.targetX = x - player.size / 2;
        };
        window.addEventListener('mousemove', updateInput);
        window.addEventListener('touchmove', (e) => { updateInput(e); e.preventDefault(); }, { passive: false });

        function startEndless() {
            gameMode = 'endless';
            modeLabel.innerText = "SCORE";
            storyUI.classList.add('hidden');
            document.getElementById('levelDisplay').classList.remove('hidden');
            resetGameState();
        }

        function showStoryBrief() {
            menu.classList.add('hidden');
            storyBrief.classList.remove('hidden');
            const s = sectors[storySector - 1];
            document.getElementById('sectorTitle').innerText = s.title;
            document.getElementById('sectorDesc').innerText = s.desc;
        }

        function startStory() {
            gameMode = 'story';
            modeLabel.innerText = "DATA";
            storyUI.classList.remove('hidden');
            document.getElementById('levelDisplay').classList.add('hidden');
            resetGameState();
        }

        function resetGameState() {
            score = 0;
            level = 1;
            obstacles = [];
            collectibles = [];
            particles = [];
            player.hasShield = false;
            shieldEl.classList.add('hidden');
            scoreEl.innerText = score;
            
            if (gameMode === 'story') {
                const s = sectors[storySector - 1];
                sectorGoal = s.goal;
                speedMultiplier = s.speed;
                spawnRate = s.spawn;
                progressBar.style.width = '0%';
            } else {
                speedMultiplier = 1;
                spawnRate = 0.02;
            }

            gameActive = true;
            menu.classList.add('hidden');
            storyBrief.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            player.targetX = canvas.width / 2 - player.size / 2;
            player.x = player.targetX;
        }

        function endGame(victory = false) {
            gameActive = false;
            if (victory) {
                if (storySector < sectors.length) {
                    storySector++;
                    showStoryBrief();
                } else {
                    document.getElementById('deathTitle').innerText = "SYSTEM OVERRIDDEN";
                    document.getElementById('deathTitle').style.color = "#0f0";
                    gameOverScreen.classList.remove('hidden');
                    finalScoreEl.innerText = score + " (ALL SECTORS CLEAR)";
                }
            } else {
                document.getElementById('deathTitle').innerText = "CRITICAL FAILURE";
                document.getElementById('deathTitle').style.color = "#ef4444";
                gameOverScreen.classList.remove('hidden');
                finalScoreEl.innerText = score;
                if (gameMode === 'endless' && score > highScore) {
                    highScore = score;
                    localStorage.setItem('neonDashHighScore', highScore);
                    highScoreEl.innerText = highScore;
                }
            }
        }

        class GameObject {
            constructor(x, y, width, height, speed, color, type = 'block') {
                this.x = x; this.y = y; this.w = width; this.h = height;
                this.speed = speed; this.color = color; this.type = type;
            }
            update() { this.y += this.speed * speedMultiplier; }
            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                if (this.type === 'shield') {
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.w/2, this.y);
                    ctx.lineTo(this.x + this.w, this.y + this.h/2);
                    ctx.lineTo(this.x + this.w/2, this.y + this.h);
                    ctx.lineTo(this.x, this.y + this.h/2);
                    ctx.closePath(); ctx.fill();
                } else if (this.type === 'zapper') {
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                    ctx.fillStyle = 'white';
                    ctx.fillRect(this.x, this.y + this.h/3, this.w, this.h/3);
                } else {
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                }
                ctx.restore();
            }
        }

        function createExplosion(x, y, color, count = 12) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12,
                    life: 1.0, size: Math.random() * 4 + 2, color
                });
            }
        }

        function update() {
            if (!gameActive) return;

            if (player.shake > 0) player.shake -= 1;
            player.x += (player.targetX - player.x) * 0.25;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;

            // Mode Logic
            if (gameMode === 'endless') {
                level = Math.floor(score / 1000) + 1;
                levelEl.innerText = level;
                speedMultiplier = 1 + (level * 0.15);
                spawnRate = Math.min(0.12, 0.02 + (level * 0.01));
            } else {
                const progress = Math.min(100, (score / sectorGoal) * 100);
                progressBar.style.width = progress + '%';
                if (score >= sectorGoal) {
                    endGame(true);
                    return;
                }
            }

            // Spawning
            if (Math.random() < spawnRate) {
                const isZapper = Math.random() < (gameMode === 'story' ? 0.2 : 0.15 + (level * 0.02));
                if (isZapper) {
                    obstacles.push(new GameObject(Math.random() * (canvas.width - 100), -30, 100, 10, 7, '#4444ff', 'zapper'));
                } else {
                    const size = 25 + Math.random() * 35;
                    obstacles.push(new GameObject(Math.random() * (canvas.width - size), -size, size, size, 4 + Math.random() * 3, '#ff3333'));
                }
            }

            if (Math.random() < 0.02) {
                collectibles.push(new GameObject(Math.random() * (canvas.width - 20), -20, 20, 20, 4, '#00ffcc', 'point'));
            }

            if (!player.hasShield && Math.random() < 0.002) {
                collectibles.push(new GameObject(Math.random() * (canvas.width - 25), -25, 25, 25, 3, '#00ff00', 'shield'));
            }

            // Update Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                if (player.x < obstacles[i].x + obstacles[i].w &&
                    player.x + player.size > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].h &&
                    player.y + player.size > obstacles[i].y) {
                    
                    if (player.hasShield) {
                        player.hasShield = false; shieldEl.classList.add('hidden');
                        player.shake = 15; createExplosion(player.x + player.size/2, player.y + player.size/2, '#00ff00', 20);
                        obstacles.splice(i, 1);
                    } else {
                        createExplosion(player.x + player.size/2, player.y + player.size/2, '#ff0000', 30);
                        endGame(); return;
                    }
                } else if (obstacles[i].y > canvas.height) {
                    obstacles.splice(i, 1);
                    score += 10; scoreEl.innerText = score;
                }
            }

            // Update Collectibles
            for (let i = collectibles.length - 1; i >= 0; i--) {
                collectibles[i].update();
                if (player.x < collectibles[i].x + collectibles[i].w &&
                    player.x + player.size > collectibles[i].x &&
                    player.y < collectibles[i].y + collectibles[i].h &&
                    player.y + player.size > collectibles[i].y) {
                    createExplosion(collectibles[i].x + collectibles[i].w/2, collectibles[i].y + collectibles[i].h/2, collectibles[i].color);
                    if (collectibles[i].type === 'shield') { player.hasShield = true; shieldEl.classList.remove('hidden'); }
                    else { score += 100; }
                    scoreEl.innerText = score;
                    collectibles.splice(i, 1);
                } else if (collectibles[i].y > canvas.height) { collectibles.splice(i, 1); }
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx; particles[i].y += particles[i].vy;
                particles[i].life -= 0.02; if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            ctx.save();
            if (player.shake > 0) ctx.translate((Math.random()-0.5) * player.shake, (Math.random()-0.5) * player.shake);
            ctx.fillStyle = 'rgba(5, 5, 5, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!gameActive) {
                ctx.strokeStyle = gameMode === 'story' ? 'rgba(255, 0, 255, 0.05)' : 'rgba(0, 255, 255, 0.03)';
                for(let i=0; i<canvas.width; i+=40) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                }
                ctx.restore(); return;
            }

            obstacles.forEach(obs => obs.draw());
            collectibles.forEach(col => col.draw());
            particles.forEach(p => {
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            if (player.hasShield) {
                ctx.beginPath(); ctx.strokeStyle = '#0f0'; ctx.lineWidth = 3;
                ctx.arc(player.x + player.size/2, player.y + player.size/2, player.size * 0.9, 0, Math.PI * 2); ctx.stroke();
            }

            ctx.shadowBlur = 20; ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
            ctx.strokeRect(player.x + 6, player.y + 6, player.size - 12, player.size - 12);
            ctx.restore();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
