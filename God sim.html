<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis: Master Singularity Build</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Consolas', monospace; color: #e6edf3; display: flex; flex-direction: column; height: 100vh; }
        #canvas-container { flex: 1; position: relative; width: 100%; }
        
        /* Dashboard Styling */
        #dashboard { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(13, 17, 23, 0.95); padding: 15px; 
            border-radius: 4px; border: 1px solid #30363d; 
            width: 280px; z-index: 10; pointer-events: none;
        }
        .stat-row { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 5px; border-bottom: 1px solid #21262d; padding-bottom: 2px; }
        .val { font-weight: bold; color: #3fb950; }
        
        /* AI Master Switch */
        #ai-switch {
            width: 100%; padding: 10px; margin-top: 10px;
            background: #21262d; border: 1px solid #ff7b72;
            color: #ff7b72; font-weight: bold; cursor: pointer;
            pointer-events: auto; border-radius: 4px; transition: 0.2s;
        }
        #ai-switch.on { border-color: #3fb950; color: #3fb950; background: #161b22; box-shadow: 0 0 10px rgba(63, 185, 80, 0.2); }

        #intel-bar-bg { width: 100%; height: 6px; background: #010409; border-radius: 3px; margin: 8px 0; overflow: hidden; }
        #intel-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3fb950, #d2a8ff); transition: width 0.4s; }

        /* Terminal Layout */
        #terminal-zone { height: 35%; display: flex; background: #0d1117; border-top: 2px solid #3fb950; }
        .term-half { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #30363d; }
        .term-label { background: #161b22; padding: 5px 12px; font-size: 10px; color: #8b949e; letter-spacing: 1px; border-bottom: 1px solid #30363d; }
        .log { flex-grow: 1; padding: 12px; overflow-y: auto; font-size: 12px; line-height: 1.4; color: #c9d1d9; }
        .input-wrap { display: flex; padding: 10px; background: #010409; border-top: 1px solid #30363d; }
        input { flex-grow: 1; background: transparent; border: none; color: #3fb950; outline: none; font-size: 14px; }

        .log-cmd { color: #3fb950; font-weight: bold; }
        .log-ai { color: #d2a8ff; font-style: italic; }
        .log-err { color: #ff7b72; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="dashboard">
        <div style="font-weight:bold; margin-bottom:8px; letter-spacing:1px;">CORE OS V7.0</div>
        <div class="stat-row">AI Learning: <span id="s-intel" class="val">0%</span></div>
        <div id="intel-bar-bg"><div id="intel-bar-fill"></div></div>
        <div class="stat-row">Population: <span id="s-pop" class="val">0</span></div>
        <div class="stat-row">Resources: <span id="s-res" class="val">0 / 0</span></div>
        <button id="ai-switch" onclick="toggleAI()">AI OVERSEER: OFF</button>
    </div>
</div>

<div id="terminal-zone">
    <div class="term-half">
        <div class="term-label">COMMAND CORE (PHYSICAL ACTS)</div>
        <div id="log-left" class="log"></div>
        <div class="input-wrap"><span>$ </span><input type="text" id="cmd-left" placeholder="Type: add human, spawn city, cure, start war..."></div>
    </div>
    <div class="term-half">
        <div class="term-label">AETHER LINK (AI THOUGHTS / PRAYERS)</div>
        <div id="log-right" class="log"></div>
    </div>
</div>

<script>
    // --- 3D RENDERER ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.65), 0.1, 1000);
    camera.position.set(0, 110, 190); camera.lookAt(0,0,0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight * 0.65);
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(50, 150, 50); scene.add(sun);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1200, 1200), new THREE.MeshStandardMaterial({ color: 0x2e4d23 }));
    ground.rotation.x = -Math.PI / 2; scene.add(ground);

    // --- LOGIC STATE ---
    let state = { pop: 0, mil: 0, stone: 0, wood: 0, intel: 0, aiActive: false, war: false, dead: 0 };
    let entities = { humans: [], trees: [], mines: [], structures: [] };

    function logL(msg, cls="log-cmd") { const d = document.getElementById("log-left"); d.innerHTML += `<div class="${cls}">${msg}</div>`; d.scrollTop = d.scrollHeight; }
    function logR(msg, cls="log-ai") { const d = document.getElementById("log-right"); d.innerHTML += `<div class="${cls}">${msg}</div>`; d.scrollTop = d.scrollHeight; }

    function toggleAI() {
        state.aiActive = !state.aiActive;
        const btn = document.getElementById("ai-switch");
        btn.innerText = `AI OVERSEER: ${state.aiActive ? 'ON' : 'OFF'}`;
        btn.className = state.aiActive ? 'on' : '';
        logR(state.aiActive ? "Neural Sync Established." : "Neural Sync Terminated.", "log-ai");
    }

    // --- ENTITY SPAWNERS ---
    function spawnHuman(type="civ", pos=null) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshStandardMaterial({ color: type === "mil" ? 0x0066ff : 0xcd853f }));
        const p = pos || { x: (Math.random()-0.5)*300, z: (Math.random()-0.5)*300 };
        mesh.position.set(p.x, 2, p.z);
        scene.add(mesh);
        entities.humans.push({ mesh, type, target: new THREE.Vector3(p.x, 2, p.z) });
        if(type === "mil") state.mil++; else state.pop++;
    }

    function spawnCity() {
        const cx = (Math.random()-0.5)*200, cz = (Math.random()-0.5)*200;
        for(let i=0; i<5; i++) {
            const h = 10 + Math.random()*20;
            const b = new THREE.Mesh(new THREE.BoxGeometry(10, h, 10), new THREE.MeshStandardMaterial({color: 0x333333}));
            b.position.set(cx + (i*14-28), h/2, cz + (Math.random()*10));
            scene.add(b); entities.structures.push(b);
        }
        for(let i=0; i<8; i++) spawnHuman("civ", {x: cx, z: cz});
        logL("City infrastructure initialized.");
    }

    function spawnTree(n=5) {
        for(let i=0; i<n; i++) {
            const t = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 4), new THREE.MeshStandardMaterial({color: 0x3d2b1f}));
            const leaf = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 8), new THREE.MeshStandardMaterial({color: 0x1a4a1a}));
            leaf.position.y = 4; t.add(trunk); t.add(leaf);
            t.position.set((Math.random()-0.5)*500, 2, (Math.random()-0.5)*500);
            scene.add(t); entities.trees.push(t);
        }
    }

    // --- THE GREEDY PARSER ---
    document.getElementById("cmd-left").addEventListener("keypress", (e) => {
        if(e.key === "Enter") {
            const raw = e.target.value;
            const input = raw.toLowerCase();
            logL(`ROOT@USER: ${raw}`);
            e.target.value = "";

            const count = parseInt(input.match(/\d+/)) || (input.match(/\ba\b|\ban\b/) ? 1 : 1);

            // Universal Trigger
            if(input.match(/add|spawn|make|create|start|do|put|give|cure|heal/)) {
                if(input.includes("human") || input.includes("people")) { for(let i=0; i<count; i++) spawnHuman(); }
                else if(input.includes("city")) spawnCity();
                else if(input.includes("tree") || input.includes("forest")) spawnTree(count);
                else if(input.includes("mine")) {
                    const m = new THREE.Mesh(new THREE.BoxGeometry(12, 1, 12), new THREE.MeshStandardMaterial({color: 0x111111}));
                    m.position.set((Math.random()-0.5)*250, 0.5, (Math.random()-0.5)*250);
                    scene.add(m); entities.mines.push(m);
                    logL("Mining zone established.");
                }
                else if(input.includes("war")) { state.war = true; logL("War protocol engaged.", "log-err"); }
                else if(input.includes("cure") || input.includes("heal") || input.includes("stop")) { state.war = false; logL("Global restoration applied."); }
            } else {
                logL("Unknown command. Use 'add [thing]' or 'cure'.", "log-err");
            }
            if(state.aiActive) state.intel += 1.5;
        }
    });

    // --- GAME ENGINE ---
    function animate() {
        requestAnimationFrame(animate);
        entities.humans.forEach((h, i) => {
            if(Math.random() < 0.02) {
                h.target.x += (Math.random()-0.5)*60;
                h.target.z += (Math.random()-0.5)*60;
            }
            h.mesh.position.lerp(h.target, 0.04);
            
            // Auto Death/Grave Logic
            if(state.war && Math.random() < 0.0025) {
                if(state.stone >= 10) {
                    const g = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 0.5), new THREE.MeshStandardMaterial({color: 0x666666}));
                    g.position.copy(h.mesh.position); scene.add(g); state.dead++;
                    state.stone -= 10;
                }
                scene.remove(h.mesh); entities.humans.splice(i, 1);
                if(h.type === "mil") state.mil--; else state.pop--;
                logR("A life has concluded.");
            }
        });
        renderer.render(scene, camera);
    }

    setInterval(() => {
        // AI Logic
        if(state.aiActive) {
            state.intel += 0.4;
            if(state.intel >= 100) {
                state.intel = 100;
                if(Math.random() < 0.1) {
                    if(state.pop < 15) spawnHuman();
                    else if(entities.trees.length < 20) spawnTree(1);
                    logR("AI Action: Optimizing colony density...");
                }
            }
        }
        
        // Economy & UI
        state.wood += state.pop;
        state.stone += (state.pop * 2) + (entities.mines.length * 20);
        document.getElementById("s-intel").innerText = Math.floor(state.intel) + "%";
        document.getElementById("intel-bar-fill").style.width = state.intel + "%";
        document.getElementById("s-pop").innerText = state.pop;
        document.getElementById("s-res").innerText = `${state.wood} / ${state.stone}`;
    }, 1500);

    animate();
    spawnTree(15);
    for(let i=0; i<5; i++) spawnHuman();
</script>
</body>
</html>
