<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Touch Grass Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky Blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
        }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: none;
            min-width: 180px;
        }
        .shop-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            width: 280px;
            max-height: 60vh;
            overflow-y: auto;
        }
        .status-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }
        #health-fill {
            height: 100%;
            width: 20%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            transition: width 0.3s ease;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .shop-item:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
        }
        .shop-item:active {
            transform: scale(0.98);
        }
        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 10;
        }
        #notification {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Stats Panel -->
    <div class="ui-panel">
        <div class="flex items-center gap-2 mb-1">
            <span class="text-xl">🌿</span>
            <span id="points-display" class="font-bold text-green-700 text-lg">0</span>
        </div>
        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Mental Sanity</div>
        <div class="status-bar">
            <div id="health-fill"></div>
        </div>
        <div id="sanity-status" class="text-[10px] mt-1 text-gray-500 italic">Starting your journey...</div>
    </div>

    <!-- Notification -->
    <div id="notification">Notification message</div>

    <!-- Shop Panel -->
    <div class="shop-panel">
        <h3 class="font-bold text-gray-700 mb-3 border-bottom pb-1 flex items-center justify-between">
            Garden Shop 
            <span class="text-xs font-normal text-gray-400">Upgrades</span>
        </h3>
        
        <div id="shop-container">
            <!-- Items generated by JS -->
        </div>
    </div>
    
    <canvas id="grassCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('grassCanvas');
    const ctx = canvas.getContext('2d');
    const healthFill = document.getElementById('health-fill');
    const pointsDisplay = document.getElementById('points-display');
    const shopContainer = document.getElementById('shop-container');
    const sanityStatus = document.getElementById('sanity-status');
    const notification = document.getElementById('notification');

    let width, height;
    let blades = [];
    let mouse = { x: -1000, y: -1000, active: false };
    
    // Game State
    let state = {
        points: 0,
        sanity: 20,
        grassCount: 80,
        pointMultiplier: 1,
        autoPoints: 0,
        interactionRadius: 100
    };

    const MAX_SANITY = 100;

    const shopItems = [
        {
            id: 'more_grass',
            name: 'Super Fertilizer',
            desc: '+20 grass blades',
            cost: 50,
            icon: '🌱',
            onBuy: () => {
                state.grassCount += 20;
                initGrass();
            }
        },
        {
            id: 'point_up',
            name: 'Better Gloves',
            desc: '2x points per touch',
            cost: 150,
            icon: '🧤',
            onBuy: () => {
                state.pointMultiplier *= 2;
            }
        },
        {
            id: 'auto_water',
            name: 'Auto Sprinkler',
            desc: '+1 point every sec',
            cost: 300,
            icon: '💧',
            onBuy: () => {
                state.autoPoints += 1;
            }
        },
        {
            id: 'wide_reach',
            name: 'Long Arms',
            desc: '+30% touch range',
            cost: 500,
            icon: '🙌',
            onBuy: () => {
                state.interactionRadius *= 1.3;
            }
        }
    ];

    class GrassBlade {
        constructor() {
            this.init();
        }

        init() {
            this.x = Math.random() * width;
            this.y = height;
            this.height = 80 + Math.random() * 120;
            this.angle = 0;
            this.targetAngle = 0;
            this.color = this.getRandomGreen();
            this.width = 3 + Math.random() * 4;
            this.swayOffset = Math.random() * Math.PI * 2;
        }

        getRandomGreen() {
            const hues = [90, 100, 120, 145];
            const h = hues[Math.floor(Math.random() * hues.length)];
            const s = 45 + Math.random() * 35;
            const l = 25 + Math.random() * 25;
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        update(time) {
            const sway = Math.sin(time * 0.002 + this.swayOffset) * 0.12;
            const dx = this.x - mouse.x;
            const dy = (height - this.height/2) - mouse.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < state.interactionRadius) {
                const force = (state.interactionRadius - dist) / state.interactionRadius;
                const dir = dx > 0 ? 1 : -1;
                this.targetAngle = dir * force * 1.5;
                
                if (mouse.active) {
                    addPoints(0.05 * state.pointMultiplier);
                    increaseSanity(0.08);
                    if (Math.random() > 0.92) createParticle(this.x, height - this.height);
                }
            } else {
                this.targetAngle = sway;
            }
            this.angle += (this.targetAngle - this.angle) * 0.1;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            const bend = this.angle * this.height;
            ctx.quadraticCurveTo(bend * 0.5, -this.height * 0.5, bend, -this.height);
            ctx.lineWidth = this.width;
            ctx.lineCap = 'round';
            ctx.strokeStyle = this.color;
            ctx.stroke();
            ctx.restore();
        }
    }

    function initGrass() {
        blades = [];
        for (let i = 0; i < state.grassCount; i++) {
            blades.push(new GrassBlade());
        }
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        initGrass();
    }

    function createParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 3 + Math.random() * 5;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = x + 'px';
        p.style.top = (y + 50) + 'px';
        p.style.backgroundColor = '#86efac';
        document.getElementById('game-container').appendChild(p);

        p.animate([
            { transform: 'translate(0,0) scale(1)', opacity: 1 },
            { transform: `translate(${(Math.random()-0.5)*60}px, -80px) scale(0)`, opacity: 0 }
        ], { duration: 800, easing: 'ease-out' }).onfinish = () => p.remove();
    }

    function addPoints(amt) {
        state.points += amt;
        pointsDisplay.innerText = Math.floor(state.points);
        updateShop();
    }

    function increaseSanity(amt) {
        state.sanity = Math.min(MAX_SANITY, state.sanity + amt);
        healthFill.style.width = state.sanity + '%';
        
        if (state.sanity > 90) sanityStatus.innerText = "Ultimate Peace";
        else if (state.sanity > 60) sanityStatus.innerText = "Feeling Better";
        else if (state.sanity > 30) sanityStatus.innerText = "Recovering...";
        else sanityStatus.innerText = "Needs Nature";
    }

    function showNotification(msg) {
        notification.innerText = msg;
        notification.style.opacity = 1;
        setTimeout(() => notification.style.opacity = 0, 2000);
    }

    function updateShop() {
        shopContainer.innerHTML = '';
        shopItems.forEach(item => {
            const el = document.createElement('div');
            const canAfford = state.points >= item.cost;
            el.className = `shop-item ${canAfford ? '' : 'disabled'}`;
            el.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-2xl">${item.icon}</span>
                    <div>
                        <div class="text-xs font-bold text-gray-700">${item.name}</div>
                        <div class="text-[9px] text-gray-500">${item.desc}</div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-xs font-bold text-green-600">${item.cost}</div>
                    <div class="text-[8px] uppercase text-gray-400">Points</div>
                </div>
            `;
            el.onclick = () => {
                if (state.points >= item.cost) {
                    state.points -= item.cost;
                    item.cost = Math.floor(item.cost * 1.5); // Increase price
                    item.onBuy();
                    addPoints(0); // Update display
                    showNotification(`Purchased ${item.name}!`);
                }
            };
            shopContainer.appendChild(el);
        });
    }

    // Auto-points loop
    setInterval(() => {
        if (state.autoPoints > 0) {
            addPoints(state.autoPoints);
        }
    }, 1000);

    function animate(time) {
        ctx.clearRect(0, 0, width, height);
        
        // Ground
        const grad = ctx.createLinearGradient(0, height - 120, 0, height);
        grad.addColorStop(0, '#87CEEB');
        grad.addColorStop(1, '#1e3a1a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        blades.forEach(blade => {
            blade.update(time);
            blade.draw();
        });

        // Decay sanity
        if (!mouse.active && state.sanity > 2) {
            state.sanity -= 0.015;
            healthFill.style.width = state.sanity + '%';
        }

        requestAnimationFrame(animate);
    }

    const handleInput = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        mouse.x = clientX - rect.left;
        mouse.y = clientY - rect.top;
        mouse.active = true;
    };

    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });
    window.addEventListener('mousedown', () => mouse.active = true);
    window.addEventListener('mouseup', () => mouse.active = false);
    window.addEventListener('touchstart', handleInput, { passive: false });
    window.addEventListener('touchmove', handleInput, { passive: false });
    window.addEventListener('touchend', () => mouse.active = false);
    window.addEventListener('resize', resize);

    window.onload = () => {
        resize();
        updateShop();
        requestAnimationFrame(animate);
    };
</script>

</body>
</html>
