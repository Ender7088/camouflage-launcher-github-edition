<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nightmare Boss Fight</title>
    <style>
        body { background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Courier New', Courier, monospace; overflow: hidden; margin: 0; touch-action: none; }
        #game-container { position: relative; margin-top: 10px; }
        canvas { border: 3px solid #fff; background-color: #000; max-width: 95vw; max-height: 60vh; image-rendering: pixelated; }
        
        .ui-top { text-align: center; padding: 10px; }
        .night-label { font-size: 28px; color: #e74c3c; font-weight: bold; text-shadow: 2px 2px #500; }
        .stats { font-size: 18px; color: #ff0; display: flex; gap: 30px; margin-bottom: 5px; }

        /* Mobile Controls - Hidden by default */
        #mobile-controls { display: none; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(2, 70px); gap: 10px; margin-top: 15px; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 50%; user-select: none; }
        .btn:active { background: rgba(255,255,255,0.4); }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }

        /* Menu Overlays */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        button { background: transparent; color: white; border: 2px solid white; padding: 10px 20px; font-family: 'Courier New'; font-size: 20px; cursor: pointer; margin-top: 20px; }
        button:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div class="ui-top">
        <div class="night-label">NIGHT <span id="nightNum">1</span></div>
        <div class="stats">
            <div>HP: <span id="hp">20</span></div>
            <div>TIME: <span id="clock">12:00</span> AM</div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="overlay">
            <h1 id="status-text" style="color:red;">YOU DIED</h1>
            <button onclick="resetGame()">RETRY NIGHT</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="btn up" id="btnUp">↑</div>
        <div class="btn left" id="btnLeft">←</div>
        <div class="btn down" id="btnDown">↓</div>
        <div class="btn right" id="btnRight">→</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const statusText = document.getElementById("status-text");

        // Logic variables
        let currentNight = 1;
        let player, projectiles, frame, elapsedSeconds, gameActive;
        const box = { x: 50, y: 160, w: 300, h: 220 };

        // 1. Mobile Detection
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById("mobile-controls").style.display = "grid";
        }

        function init() {
            player = { x: 200, y: 300, size: 8, speed: 4.5, hp: 20 };
            projectiles = [];
            frame = 0;
            elapsedSeconds = 0;
            gameActive = true;
            overlay.style.display = "none";
            document.getElementById("hp").innerText = player.hp;
            document.getElementById("nightNum").innerText = currentNight;
        }

        // Input Handling
        const keys = {};
        const touch = { Up: false, Down: false, Left: false, Right: false };
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        const bind = (id, p) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); touch[p] = true; };
            el.ontouchend = (e) => { e.preventDefault(); touch[p] = false; };
        };
        bind("btnUp","Up"); bind("btnDown","Down"); bind("btnLeft","Left"); bind("btnRight","Right");

        // Night Timer
        setInterval(() => {
            if (gameActive) {
                elapsedSeconds++;
                let hour = Math.floor(elapsedSeconds / 60);
                if (hour === 0) hour = 12;
                document.getElementById("clock").innerText = hour + ":" + (elapsedSeconds % 60).toString().padStart(2, '0');
                
                if (elapsedSeconds >= 360) winNight();
            }
        }, 1000);

        function winNight() {
            gameActive = false;
            if (currentNight < 6) {
                statusText.innerText = "6 AM - NIGHT COMPLETED";
                statusText.style.color = "#0f0";
                overlay.style.display = "flex";
                const btn = overlay.querySelector('button');
                btn.innerText = "START NIGHT " + (currentNight + 1);
                btn.onclick = () => { currentNight++; init(); };
            } else {
                statusText.innerText = "YOU SURVIVED THE FINAL NIGHT";
                overlay.style.display = "flex";
                overlay.querySelector('button').style.display = "none";
            }
        }

        function triggerGameOver() {
            gameActive = false;
            statusText.innerText = "WAS IT ME?";
            statusText.style.color = "red";
            overlay.style.display = "flex";
            const btn = overlay.querySelector('button');
            btn.innerText = "RETRY NIGHT " + currentNight;
            btn.onclick = () => init();
        }

        function spawnAttack() {
            // NIGHT SCALING: Attacks happen more often and move faster as nights progress
            let spawnRate = Math.max(8, 45 - (currentNight * 5));
            let projSpeed = 2 + (currentNight * 0.7);

            if (frame % spawnRate === 0) {
                projectiles.push({ x: box.x + Math.random() * box.w, y: box.y, type: 'freddle', speed: projSpeed, size: 10 });
            }
            if (frame % 130 === 0) {
                projectiles.push({ x: box.x, y: box.y + 50, type: 'cupcake', vx: 1.5 + (currentNight*0.3), vy: 1.5 + (currentNight*0.3), size: 14 });
            }
            if (frame % Math.max(60, 180 - (currentNight * 20)) === 0) {
                projectiles.push({ x: box.x + box.w, y: player.y, type: 'claw', speed: -(projSpeed + 2), size: 22 });
            }
        }

        function update() {
            if (!gameActive) return;

            if ((keys["ArrowUp"] || touch.Up) && player.y > box.y + player.size) player.y -= player.speed;
            if ((keys["ArrowDown"] || touch.Down) && player.y < box.y + box.h - player.size) player.y += player.speed;
            if ((keys["ArrowLeft"] || touch.Left) && player.x > box.x + player.size) player.x -= player.speed;
            if ((keys["ArrowRight"] || touch.Right) && player.x < box.x + box.w - player.size) player.x += player.speed;

            projectiles.forEach((p, i) => {
                if (p.type === 'freddle') p.y += p.speed;
                if (p.type === 'claw') p.x += p.speed;
                if (p.type === 'cupcake') {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x <= box.x || p.x >= box.x + box.w) p.vx *= -1;
                    if (p.y <= box.y || p.y >= box.y + box.h) p.vy *= -1;
                }

                if (Math.hypot(player.x - p.x, player.y - p.y) < player.size + p.size/2) {
                    player.hp--;
                    document.getElementById("hp").innerText = player.hp;
                    projectiles.splice(i, 1);
                    if (player.hp <= 0) triggerGameOver();
                }
                if (p.y > box.y + box.h + 20 || p.x < box.x - 60) projectiles.splice(i, 1);
            });
            frame++;
            spawnAttack();
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Battle Box
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.strokeRect(box.x, box.y, box.w, box.h);

            // Crying Child Soul
            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();

            // Attacks
            projectiles.forEach(p => {
                if (p.type === 'freddle') ctx.fillStyle = "#4e342e";
                if (p.type === 'cupcake') ctx.fillStyle = "#ec407a";
                if (p.type === 'claw') ctx.fillStyle = "#78909c";
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            });

            update();
            requestAnimationFrame(draw);
        }

        init();
        draw();
    </script>
</body>
</html>
