<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emu - Game Launcher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background: #0e141f; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header {
            height: 60px; background: #00b500; border-bottom: 5px solid #fff;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 10;
        }
        .header-title { color: white; font-weight: bold; font-size: 1.2rem; }
        .controls { display: flex; gap: 12px; }
       
        .control-btn {
            padding: 8px 16px; border-radius: 8px; border: 3px solid white;
            background: rgba(0,0,0,0.2); color: white; cursor: pointer;
            font-weight: bold; font-size: 0.9rem; transition: 0.2s;
        }
        .control-btn:hover { background: white; color: #00b500; }
        .exit-btn { background: #ff4444; border-color: #ff4444; }

        /* CONTAINER */
        .container { display: flex; flex: 1; height: calc(100vh - 60px); }

        /* SIDEBAR (Left) */
        .sidebar {
            width: 260px; background: #161f16; border-right: 5px solid #00b500;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        .sidebar-label { color: #888; font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; }
       
        .side-btn {
            width: 100%; padding: 14px; background: #00b500; color: white;
            border: 4px solid #fff; border-radius: 12px; cursor: pointer;
            font-weight: bold; font-size: 1rem; text-align: left;
            display: flex; align-items: center; gap: 12px;
            transition: 0.1s;
        }
        .side-btn:hover { transform: scale(1.03); background: #00d100; }
        .side-btn img { width: 24px; height: 24px; border-radius: 4px; }

        /* WINDOW (Right) */
        .game-window { flex: 1; background: #000; position: relative; }
        #gameFrame { width: 100%; height: 100%; border: none; display: none; }
       
        .welcome {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #444; text-align: center; font-size: 1.3rem; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">EMU LAUNCHER</div>
        <div class="controls">
            <button class="control-btn" onclick="toggleFullscreen()">FULL SCREEN</button>
            <button class="control-btn exit-btn" onclick="location.href='starter.html'">BACK</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-label">GAME SOURCES</div>
           
            <button class="side-btn" onclick="loadUrl('https://pizzaedition.win/g/')">
                <img src="https://pizzaedition.win/favicon.ico">
                Pizza Edition
            </button>

            <button class="side-btn" onclick="loadUrl('https://freezenova.com/')">
                <img src="https://freezenova.com/favicon.ico" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5260/5260472.png'">
                Freeze Nova
            </button>
        </div>

        <div class="game-window" id="gameWindow">
            <div id="welcomeMsg" class="welcome">
                <p>CHOOSE A SOURCE FROM THE SIDEBAR <br> TO BEGIN PLAYING</p>
            </div>
            <iframe id="gameFrame" allowfullscreen allow="autoplay; fullscreen; keyboard"></iframe>
        </div>
    </div>

    <script>
        function loadUrl(url) {
            document.getElementById('welcomeMsg').style.display = 'none';
            const frame = document.getElementById('gameFrame');
            frame.style.display = 'block';
            frame.src = url;
        }

        function toggleFullscreen() {
            const win = document.getElementById("gameWindow");
            if (!document.fullscreenElement) {
                win.requestFullscreen().catch(err => {
                    alert(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
