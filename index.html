        @import url('Roboto_Condensed-Bold.ttf');
        * {
            margin: 0;
            padding: 0;
            font-family: "Roboto", sans-serif;
            z-index: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: rgb(14, 20, 31);
        }
        .content {
            display: flex;
            flex-direction: row;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin-top: 10rem;
        }
        .card {
            background: linear-gradient(to bottom right, rgba(128, 128, 128, 0.599), rgba(104, 100, 100, 0.599), rgba(128, 128, 128, 0.599));
            width: 15rem;
            height: 10rem;
            position: relative;
            margin: 10px;
            border-radius: 1vh;
            transition: all 0.2s ease;
            filter: brightness(75%);
        }
        .card:hover h2 {
            opacity: 1;
        }
        .card h2 {
            bottom: -20%;
            position: absolute;
            right: 50%;
            transform: translateX(50%);
            padding: 10px;
            color: rgb(215, 207, 207);
            z-index: 2;
            transition: 0.2s ease;
            opacity: 0;
            background: rgb(2, 166, 70);
            border: white solid 0.35rem;
            border-radius: 100vh;
            width: 5rem;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }
        .card img {
            width: 100%;
            height: 100%;
            border-radius: 1vh;
        }
        .card:hover {
            transform: perspective(1000px) translateZ(130px);
            z-index: 1;
            filter: brightness(100%);
        }
        .sidebar {
            position: absolute;
            top: 0;
            width: 100%;
            height: auto;
            background: rgb(0, 181, 0);
            border-bottom: solid white 0.4rem;
            display: flex;
            justify-content: center;
            flex-direction: row;
            z-index: 1;
        }
        .sidebar ul {
            text-decoration: none;
            list-style-type: none;
            height: 2.5rem;
            width: 2.5rem;
            padding: 10px;
            display: flex;
            justify-content: center;
            flex-direction: row;
            gap: 20px;
        }
        .sidebar li {
            height: 2.5rem;
            width: 2.5rem;
        }
        .sidebar img {
            height: 2.5rem;
            width: 2.5rem;
            transition: box-shadow 0.5s ease;
        }
        .sidebar img:hover {
            box-shadow: 1px 1px 10px white;
        }
    </style>
</head>
